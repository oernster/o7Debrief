# ---------------------------------------------------------------------------
# Format: display formatting tokens for the report. Keeping these here means
# the renderer carries no formatting literals of its own.
# ---------------------------------------------------------------------------

[format]
credits_suffix = "Cr"
distance_suffix = "ly"
thousands = true
duration_format = "{hours}h {minutes}m"
time_format = "%H:%M:%S"
datetime_format = "%Y-%m-%d %H:%M:%S"
